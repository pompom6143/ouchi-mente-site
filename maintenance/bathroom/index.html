  <link rel="stylesheet" href="../../css/style.css" /><script defer src="../../js/common-parts.js"></script></head><body><div data-common-header></div><main class="page-shell"><nav class="breadcrumb"><a href="../../index.html">ホーム</a> / <span>お風呂・カビのメンテナンス</span></nav><header class="page-header"><h1 class="page-title">お風呂・カビのメンテナンス</h1><p class="lead-text">湿気や黒カビをためこまないために、毎日の換気と定期掃除のポイントを整理しています。</p></header><section class="section"><div class="grid grid-2"><div class="info-card"><h2>このカテゴリでわかること</h2><p>カビが出やすい場所、入浴後にできる小さな習慣、週1回の掃除で見直したいポイントがわかります。</p></div><div class="info-card"><h2>季節ごとの補足</h2><p>梅雨前は、排水口・換気扇・ゴムパッキンを軽く見直しておくと安心です。</p></div></div></section><section class="section"><div class="section-head"><h2 class="section-title">関連記事</h2><p class="section-desc">まず読んでおきたい基本の記事です。</p></div><div class="grid popular-grid"><article class="article-card"><span class="meta">お風呂</span><h3>お風呂のカビ対策に必要なこと</h3><p>黒カビを防ぐために今日からできる習慣。</p><a class="card-link" href="../../articles/bathroom-mold-prevention.html">読む</a></article></div></section><div data-common-app-promo></div></main><div data-common-footer></div></body></html>
